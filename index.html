<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoiler-Free BBC Athletics</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 15px; background: #121212; color: #fff;
        }
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1c1e; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        input[type="datetime-local"] {
            padding: 15px; font-size: 18px; border-radius: 8px;
            border: none; margin: 20px 0; width: 100%; max-width: 300px;
        }
        button {
            padding: 15px 30px; font-size: 16px; font-weight: bold;
            background: #ffd700; color: #000; border: none;
            border-radius: 8px; width: 100%; max-width: 300px; cursor: pointer;
        }
        .card {
            background: #1e1e1e; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; border-left: 4px solid #ffd700;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; }
        .card a { color: #ffd700; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
        .card p { margin: 5px 0; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <!-- GATEKEEPER SCREEN -->
    <div id="gatekeeper">
        <h2>⏱️ Set Your Safe Time</h2>
        <p>Articles published after this time will stay hidden.</p>
        <input type="datetime-local" id="cutoff-date">
        <button onclick="unlockAndLoad()">Enter Dashboard</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <h2>🏃 BBC Athletics Feed</h2>
        <p id="status">Loading data...</p>
        <div id="news-feed"></div>
    </div>

    <script>
        // Register PWA service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        }

        function unlockAndLoad() {
            const dateInputValue = document.getElementById('cutoff-date').value;
            if(!dateInputValue) return alert("Please select a date and time!");
            
            const cutoffDate = new Date(dateInputValue);
            
            // UI Transition
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // BBC Sport Athletics Feed URL processed via free open proxy
            const bbcFeed = "https://feeds.bbci.co.uk/sport/athletics/rss.xml";
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(bbcFeed)}`;

            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('news-feed');
                    document.getElementById('status').innerText = `Showing safe articles up to: ${cutoffDate.toLocaleString()}`;
                    
                    if (!data.items || data.items.length === 0) {
                        container.innerHTML = "<p>No articles found.</p>";
                        return;
                    }

                    data.items.forEach(item => {
                        // RSS2JSON converts pubDate to standard 'YYYY-MM-DD HH:MM:SS' format UTC
                        const articleDate = new Date(item.pubDate.replace(' ', 'T') + 'Z'); 

                        // THE SPOILER FILTER
                        if (articleDate <= cutoffDate) {
                            const card = document.createElement('div');
                            card.className = 'card';
                            card.innerHTML = `
                                <h3>${item.title}</h3>
                                <p>${item.description || ''}</p>
                                <p><em>Published: ${articleDate.toLocaleString()}</em></p>
                                <a href="${item.link}" target="_blank">Read Article ↗</a>
                            `;
                            container.appendChild(card);
                        }
                    });

                    if(container.children.length === 0) {
                        container.innerHTML = "<p>All recent articles are from after your cutoff time. Safe from spoilers!</p>";
                    }
                })
                .catch(err => {
                    document.getElementById('status').innerText = "Error loading BBC feed.";
                    console.error(err);
                });
        }
    </script>
</body>
</html>
