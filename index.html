<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoiler-Free Athletics Dashboard</title>
    
    <!-- Link to the manifest file (Crucial for Android App Install) -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Android Home Screen Icon Shortcut tags -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    
    <!-- Theme color for the Android status bar -->
    <meta name="theme-color" content="#f4f4f6">

    <!-- iOS Compatibility tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 15px; background: #ffffff; color: #1a1a1a;
        }
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f4f6; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        input[type="datetime-local"] {
            padding: 15px; font-size: 18px; border-radius: 8px;
            border: 1px solid #ccc; margin: 20px 0; width: 100%; max-width: 300px;
            background: #ffffff; color: #000000;
        }
        button {
            padding: 15px 30px; font-size: 16px; font-weight: bold;
            background: #005bc5; color: #ffffff; border: none;
            border-radius: 8px; width: 100%; max-width: 300px; cursor: pointer;
        }
        .card {
            background: #f8f9fa; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; border-left: 4px solid #005bc5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; color: #000000; }
        .card a { color: #005bc5; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 10px; }
        .card p { margin: 5px 0; color: #555; font-size: 14px; }
    </style>
</head>
<body>

    <!-- GATEKEEPER SCREEN -->
    <div id="gatekeeper">
        <h2>⏱️ Set Your Safe Time</h2>
        <p>Articles published after this time will stay hidden.</p>
        <input type="datetime-local" id="cutoff-date">
        <button onclick="unlockAndLoad()">Enter Dashboard</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <h2>🏃 Athletics News Feed</h2>
        <p id="status">Loading data...</p>
        <div id="news-feed"></div>
    </div>

    <script>
        // Register PWA service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        }

        function unlockAndLoad() {
            const dateInputValue = document.getElementById('cutoff-date').value;
            if(!dateInputValue) return alert("Please select a date and time!");
            
            const cutoffDate = new Date(dateInputValue);
            
            // UI Transition
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Mix of athletics-specific AND general sports feeds
            const feeds = [
                // Dedicated Athletics Feeds
                "https://feeds.bbci.co.uk/sport/athletics/rss.xml",
                "https://athleticsweekly.com/feed",
                "https://worldathletics.org/news/rss",
                "https://www.theguardian.com/sport/athletics/rss",
                "http://uka.org.uk/feed",
                "http://runblogrun.com/feed",
                "https://www.watchathletics.com/rss/news/",
                
                // Broad Sports Feeds (Filtered by keywords below)
                "https://www.skysports.com/rss/12040",
                "https://www.independent.co.uk/sport/rss"
            ];

            // Keywords to identify athletics articles from broad sports feeds
            const athleticsKeywords = [
                "athletics", "track and field", "marathon", "sprint", "100m", "200m", "400m", 
                "800m", "1500m", "relay", "hurdles", "steeplechase", "long jump", "triple jump", 
                "high jump", "pole vault", "shot put", "discus", "javelin", "hammer throw", 
                "decathlon", "heptathlon", "hodgkinson", "kerr", "hudson-smith", "asher-smith"
            ];

            const container = document.getElementById('news-feed');
            document.getElementById('status').innerText = `Loading feeds securely...`;

            const fetchPromises = feeds.map(feed => 
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}`)
                .then(res => res.json())
                .then(data => data.items || [])
                .catch(err => { 
                    console.error("Error fetching feed: " + feed); 
                    return []; 
                })
            );

            Promise.all(fetchPromises).then(allFeedResults => {
                let allArticles = allFeedResults.flat();

                // Sort all articles globally by date (newest first)
                allArticles.sort((a, b) => {
                    const dateA = new Date(a.pubDate.replace(' ', 'T') + 'Z');
                    const dateB = new Date(b.pubDate.replace(' ', 'T') + 'Z');
                    return dateB - dateA;
                });

                container.innerHTML = ''; 
                document.getElementById('status').innerText = `Showing safe articles up to: ${cutoffDate.toLocaleString()}`;

                let visibleCount = 0;

                allArticles.forEach(item => {
                    const articleDate = new Date(item.pubDate.replace(' ', 'T') + 'Z'); 
                    const titleText = (item.title || "").toLowerCase();
                    const descText = (item.description || "").toLowerCase();
                    const fullText = titleText + " " + descText;

                    // CHECK 1: Is this explicitly from an athletics feed OR does it mention athletics keywords?
                    const isAthleticsFeed = item.link.includes("athletics") || item.link.includes("uka.org") || item.link.includes("runblogrun");
                    const matchesKeyword = athleticsKeywords.some(keyword => fullText.includes(keyword));

                    // CHECK 2: THE SPOILER FILTER (Must pass time restriction)
                    if ((isAthleticsFeed || matchesKeyword) && articleDate <= cutoffDate) {
                        visibleCount++;
                        
                        // Determine the source brand name
                        let sourceName = "General Sport";
                        if (item.link.includes("bbc.co.uk")) sourceName = "BBC Sport";
                        else if (item.link.includes("athleticsweekly.com")) sourceName = "Athletics Weekly";
                        else if (item.link.includes("worldathletics.org")) sourceName = "World Athletics";
                        else if (item.link.includes("theguardian.com")) sourceName = "The Guardian";
                        else if (item.link.includes("uka.org.uk")) sourceName = "UK Athletics";
                        else if (item.link.includes("runblogrun.com")) sourceName = "RunBlogRun";
                        else if (item.link.includes("skysports.com")) sourceName = "Sky Sports";
                        else if (item.link.includes("independent.co.uk")) sourceName = "The Independent";
                        else if (item.link.includes("watchathletics.com")) sourceName = "Watch Athletics";

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <span style="background: #005bc5; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase;">Athletics</span>
                            <h3 style="margin-top: 8px;">${item.title}</h3>
                            <p>${item.description || ''}</p>
                            <p><em>Source: ${sourceName} | Published: ${articleDate.toLocaleString()}</em></p>
                            <a href="${item.link}" target="_blank">Read Article ↗</a>
                        `;
                        container.appendChild(card);
                    }
                });

                if(visibleCount === 0) {
                    container.innerHTML = "<p>All recent articles are from after your cutoff time. Safe from spoilers!</p>";
                }
            });
        }
    </script>
</body>
</html>
